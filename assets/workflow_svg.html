<style>
html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    font-family: Inter, "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.workflow-shell {
    width: 100%;
    min-height: 880px;
    box-sizing: border-box;
    padding: 18px;
    border-radius: 24px;
    background:
        linear-gradient(135deg, rgba(15, 23, 42, 0.9), rgba(2, 6, 23, 0.78)),
        radial-gradient(circle at 16% 10%, rgba(96, 165, 250, 0.18), transparent 30%),
        radial-gradient(circle at 82% 20%, rgba(167, 139, 250, 0.12), transparent 32%);
    border: 1px solid rgba(148, 163, 184, 0.18);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 18px 52px rgba(0,0,0,0.28);
}
svg {
    width: 100%;
    height: 844px;
    display: block;
}
.lane {
    fill: rgba(15, 23, 42, 0.42);
    stroke: rgba(148, 163, 184, 0.16);
    stroke-width: 1;
}
.lane-title {
    fill: #93c5fd;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 1.1px;
}
.lane-sub {
    fill: #64748b;
    font-size: 10px;
    font-weight: 700;
}
.flow-path,
.feed-path {
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    animation: flowDash 2.8s linear infinite;
}
.flow-path {
    stroke: rgba(129, 140, 248, 0.75);
    stroke-dasharray: 9 11;
}
.feed-path {
    stroke: rgba(245, 158, 11, 0.8);
    stroke-dasharray: 7 9;
    animation-duration: 4.2s;
    animation-direction: reverse;
}
@keyframes flowDash {
    from { stroke-dashoffset: 44; }
    to { stroke-dashoffset: 0; }
}
.node-card,
.hub-card,
.constraint-card {
    height: 100%;
    box-sizing: border-box;
    color: #e5e7eb;
}
.node-card {
    display: flex;
    flex-direction: column;
    padding: 12px 13px;
    border-radius: 14px;
    background: rgba(2, 6, 23, 0.86);
    border: 1px solid rgba(148, 163, 184, 0.18);
    box-shadow: 0 12px 32px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.04);
}
.hub-card {
    display: flex;
    flex-direction: column;
    padding: 14px 15px;
    border-radius: 18px;
    background:
        linear-gradient(135deg, rgba(30, 41, 59, 0.94), rgba(15, 23, 42, 0.88)),
        radial-gradient(circle at top left, rgba(245, 158, 11, 0.14), transparent 36%);
    border: 1px solid rgba(245, 158, 11, 0.38);
    box-shadow: 0 0 28px rgba(245, 158, 11, 0.12), inset 0 1px 0 rgba(255,255,255,0.05);
}
.node-card.blue { border-top: 3px solid #60a5fa; }
.node-card.green { border-top: 3px solid #34d399; }
.node-card.gold { border-top: 3px solid #f59e0b; }
.node-card.cyan { border-top: 3px solid #22d3ee; }
.node-card.violet { border-top: 3px solid #a78bfa; }
.node-card.red { border-top: 3px solid #fb7185; }
.node-head {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 7px;
}
.node-icon {
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex: 0 0 auto;
    border-radius: 10px;
    background: rgba(99, 102, 241, 0.18);
    font-size: 17px;
}
.node-kicker {
    color: #93c5fd;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.7px;
    line-height: 1.1;
}
.node-title {
    margin-top: 2px;
    color: #f8fafc;
    font-size: 16px;
    font-weight: 900;
    line-height: 1.18;
}
.hub-card .node-title {
    font-size: 18px;
}
.node-note {
    color: #cbd5e1;
    font-size: 10.8px;
    line-height: 1.46;
    margin: 0;
}
.node-remark {
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 6px;
    margin-top: auto;
    padding-top: 7px;
    border-top: 1px solid rgba(148, 163, 184, 0.11);
}
.node-remark b {
    color: #dbeafe;
    font-size: 9.5px;
    line-height: 1.25;
}
.node-remark span {
    color: #94a3b8;
    font-size: 9.5px;
    line-height: 1.35;
}
.constraint-card {
    padding: 12px 14px;
    border-radius: 13px;
    background: rgba(15, 23, 42, 0.76);
    border: 1px solid rgba(148, 163, 184, 0.16);
}
.constraint-title {
    color: #fbbf24;
    font-size: 12px;
    font-weight: 900;
    margin-bottom: 7px;
}
.constraint-card p,
.constraint-card ul {
    margin: 0;
    color: #cbd5e1;
    font-size: 10.6px;
    line-height: 1.55;
}
.constraint-card ul {
    padding-left: 16px;
}
.atlas-row span {
    display: inline-flex;
    margin: 3px 4px 0 0;
    padding: 4px 7px;
    border-radius: 7px;
    color: #dbeafe;
    background: rgba(30, 41, 59, 0.84);
    border: 1px solid rgba(148, 163, 184, 0.16);
    font-size: 9.2px;
    font-weight: 800;
}
.caption {
    fill: #94a3b8;
    font-size: 10.5px;
    font-weight: 700;
}
.headline {
    fill: #f8fafc;
    font-size: 23px;
    font-weight: 900;
}
.subtitle {
    fill: #cbd5e1;
    font-size: 12px;
    font-weight: 600;
}
.badge {
    fill: rgba(30, 41, 59, 0.84);
    stroke: rgba(148, 163, 184, 0.2);
}
.badge-text {
    fill: #bfdbfe;
    font-size: 10px;
    font-weight: 900;
}
</style>
