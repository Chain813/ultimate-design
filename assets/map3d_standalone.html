<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>High Performance 3D Digital Twin</title>
    <!-- 引入原生 WebGL 渲染组件 (Deck.GL) 以及无 Token 基础地图 (Carto) -->
    <script src="https://unpkg.com/deck.gl@8.9.0/dist.min.js"></script>
    <script src="https://unpkg.com/maplibre-gl@3.3.0/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.3.0/dist/maplibre-gl.css" rel="stylesheet" />
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #0d1321; }
        #map-container { width: 100vw; height: 100vh; position: absolute; }
        /* 定制化 Tooltip 样式，保持沉浸感 */
        .deck-tooltip {
            font-family: 'Inter', sans-serif;
            background: rgba(15, 23, 42, 0.85) !important;
            backdrop-filter: blur(10px) !important;
            border: 1px solid rgba(99, 102, 241, 0.4) !important;
            border-radius: 8px !important;
            color: #e2e8f0 !important;
            font-size: 13px !important;
            padding: 10px 15px !important;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4) !important;
        }
    </style>
</head>
<body>
    <div id="map-container"></div>
    <script>
        // 📥 接管从 Python 后端泵入的 JSON 数据 (无序列化损耗)
        const b_data = /*__BUILDING_DATA__*/null/*__END_BUILDING__*/;
        const bound_data = /*__BOUNDARY_DATA__*/null/*__END_BOUNDARY__*/;
        const plots_data = /*__PLOTS_DATA__*/null/*__END_PLOTS__*/;
        const poi_data = /*__POI_DATA__*/null/*__END_POI__*/;
        const traffic_data = /*__TRAFFIC_DATA__*/null/*__END_TRAFFIC__*/;
        const landuse_data = /*__LANDUSE_DATA__*/null/*__END_LANDUSE__*/;
        // 🚀 接收 3D/2D 模式配置
        const is_3d = /*__IS_3D__*/true/*__END_IS_3D__*/;

        // 🔬 高级分析图层数据链路 (Page 2 全息诊断专属)
        const hex_payload = /*__HEX_PAYLOAD__*/null/*__END_HEX_PAY__*/;
        const col_payload = /*__COL_PAYLOAD__*/null/*__END_COL_PAY__*/;
        const heat_payload = /*__HEAT_PAYLOAD__*/null/*__END_HEAT_PAY__*/;

        // 🚀 接收光照开关与时间配置
        const show_lighting = /*__SHOW_LIGHTING__*/true/*__END_LIGHTING__*/;
        const sun_time = /*__SUN_TIME__*/10/*__END_SUN_TIME__*/;

        const renderedLayers = [];

        // ==========================================
        // 🏙️ 建筑层配置 (支持内联 JSON 和 URL 异步流加载双模式)
        // ==========================================
        // 🚀 4D Morphing & X-Ray Flags
        const IS_XRAY = /*__IS_XRAY__*/false/*__END_IS_XRAY__*/;
        const IS_DEMO = /*__IS_DEMO__*/false/*__END_IS_DEMO__*/;

        // 纯函数缓存计算：在 accessor 中实时打标，保证无论谁先调用，结果绝对一致
        function ensureBuildingState(props) {
            if (props._baseHeight !== undefined) return; // 已计算过，复用缓存

            let baseHeight = 1;
            if (props.floor || props.Floor || props.levels || props['building:levels']) {
                baseHeight = parseFloat(props.floor || props.Floor || props.levels || props['building:levels']) * 3.5;
            } else if (props.height || props.Height) {
                baseHeight = parseFloat(props.height || props.Height);
            }
            props._baseHeight = baseHeight;

            // 仅对研究范围内的建筑（in_scope）分配拆改留动作，范围外作为上下文白膜保留
            // 鲁棒性增强：支持布尔、数字、字符串格式的 in_scope 标绘
            const inScope = props.in_scope === true || props.in_scope === 1 || props.in_scope === 'true' || props.in_scope === '1';
            
            if (!props.action && inScope) {
                const s = (props.prop_style || '').toLowerCase();
                if (s === 'historical' || baseHeight >= 18) props.action = 'retain';
                else if (s === 'park') props.action = 'retain_park'; // 保护绿地
                else if (baseHeight <= 7) props.action = 'demolish';
                else props.action = 'renovate';
            }
        }

        const BUILDING_LAYER_CONFIG = {
            id: 'building-layer',
            opacity: IS_XRAY ? 0.2 : 0.85,
            stroked: true,
            filled: !IS_XRAY,
            extruded: is_3d,
            wireframe: true,
            getElevation: d => {
                const props = d.properties || {};
                ensureBuildingState(props);
                // 4D Morphing: 塌缩拆除建筑到 0.2m 防止 Z-fighting，同时保留视觉反馈
                if (IS_DEMO && props.action === 'demolish') {
                    return 0.2; 
                }
                return props._baseHeight;
            },
            getFillColor: d => {
                const props = d.properties || {};
                ensureBuildingState(props);
                const s = props.prop_style;
                if (IS_DEMO) {
                    if (props.action === 'demolish') return [244, 63, 94, IS_XRAY ? 40 : 230]; // 拆: Rose
                    if (props.action === 'renovate') return [250, 204, 21, IS_XRAY ? 40 : 230]; // 改: Yellow
                    if (props.action === 'retain' || s === 'historical') return [168, 85, 247, IS_XRAY ? 40 : 230]; // 留: Purple
                    if (props.action === 'retain_park' || s === 'park') return [0, 190, 0, IS_XRAY ? 40 : 230]; // 保护绿地: Green
                }
                if (s === 'historical') return [153, 0, 255, 255];
                if (s === 'park') return [0, 190, 0, 230];
                return [173, 216, 230, IS_XRAY ? 40 : 200];
            },
            getLineColor: d => {
                const props = d.properties || {};
                ensureBuildingState(props);
                if (IS_XRAY) {
                    if (IS_DEMO && props.action === 'demolish') return [244, 63, 94, 255];
                    if (IS_DEMO && props.action === 'renovate') return [250, 204, 21, 255];
                    if (IS_DEMO && (props.action === 'retain' || props.prop_style === 'historical')) return [168, 85, 247, 255];
                    if (IS_DEMO && (props.action === 'retain_park' || props.prop_style === 'park')) return [0, 190, 0, 255];
                    return [51, 65, 85, 200]; // Dark grey outline for normal buildings in X-Ray
                }
                const s = props.prop_style;
                if (s === 'historical') return [255, 255, 255, 255];
                if (s === 'park') return [200, 255, 200, 200];
                return [255, 255, 255, 120];
            },
            lineWidthMinPixels: IS_XRAY ? 1.5 : 1,
            pickable: true,
            transitions: {
                getElevation: { duration: 2500, easing: t => t*t*(3 - 2*t) }, // Smooth 2.5s morphing
                getFillColor: { duration: 1500 },
                getLineColor: { duration: 1500 }
            }
        };

        // 模式 1：内联 JSON 模式 (直接加入渲染队列)
        if (b_data && typeof b_data === 'object') {
            renderedLayers.push(new deck.GeoJsonLayer({
                ...BUILDING_LAYER_CONFIG,
                data: b_data
            }));
        }
        // 模式 2：URL 异步流加载模式 (利用 Deck.GL 原生异步能力)
        else if (b_data && typeof b_data === 'string') {
            let fetchUrl = b_data;
            try {
                const parentOrigin = new URL(document.referrer || window.location.href).origin;
                if (b_data.startsWith('/') && !b_data.startsWith('//')) {
                    fetchUrl = parentOrigin + b_data;
                }
            } catch(e) {}
            
            renderedLayers.push(new deck.GeoJsonLayer({
                ...BUILDING_LAYER_CONFIG,
                id: 'building-layer-async',
                data: fetchUrl,
                // 🛠️ 增强：自动路径纠错 (Streamlit Cloud 404 Fallback)
                fetch: (url) => fetch(url).then(res => {
                    if (res.status === 404 && url.includes('/app/')) {
                        const fallback = url.replace('/app/', '/');
                        console.warn(`[System] 404 at ${url}, retrying fallback: ${fallback}`);
                        return fetch(fallback);
                    }
                    return res;
                }).then(res => res.json()),
                onDataLoad: (data) => console.log(`[Building] Loaded ${data.features?.length} features from ${fetchUrl}`),
                onError: (err) => console.error(`[Building] Load Failed: ${err.message}`)
            }));
        }

        // 🔲 图层 2：规划红线
        if (bound_data) {
            renderedLayers.push(new deck.GeoJsonLayer({
                id: 'boundary-layer',
                data: bound_data,
                stroked: true,
                filled: true,
                getFillColor: [239, 68, 68, 60],
                getLineColor: [239, 68, 68, 150],
                getLineWidth: 3,
                pickable: false
            }));
        }

        // 🧬 图层 2.5：规划用地底色 (EULUC / GB/T 50337-2018)
        if (landuse_data) {
            const LANDUSE_COLORS = {
                0: [255, 255, 0, 160],       // R 居住用地 (亮黄)
                1: [191, 0, 0, 160],         // C2 商务办公 (深红)
                2: [255, 0, 0, 160],         // C1 商业服务 (大红)
                3: [165, 82, 45, 160],       // M 工业用地 (棕色)
                4: [190, 190, 190, 160],     // S/U 交通场站 (灰色)
                5: [150, 150, 150, 160],     // S/U 机场设施 (深灰)
                6: [255, 127, 127, 160],     // A1 行政办公 (浅红)
                7: [255, 191, 255, 160],     // A3 教育科研 (粉紫)
                8: [255, 127, 212, 160],     // A5 医疗卫生 (粉红)
                9: [153, 0, 255, 160],       // A2 体育文化 (紫色)
                10: [0, 190, 0, 160]         // G 公园绿地 (翠绿)
            };
            let luUrl = landuse_data;
            if (typeof landuse_data === 'string' && landuse_data.startsWith('/') && !landuse_data.startsWith('//')) {
                try {
                    const parentOrigin = new URL(document.referrer || window.location.href).origin;
                    luUrl = parentOrigin + landuse_data;
                } catch(e) {}
            }

            renderedLayers.push(new deck.GeoJsonLayer({
                id: 'landuse-layer',
                data: luUrl,
                stroked: true,
                filled: true,
                extruded: false,
                getFillColor: d => LANDUSE_COLORS[d.properties.Class] || [80, 80, 80, 100],
                getLineColor: d => {
                    const c = LANDUSE_COLORS[d.properties.Class] || [80, 80, 80, 100];
                    return [c[0], c[1], c[2], 200];
                },
                getLineWidth: 1,
                lineWidthMinPixels: 1,
                parameters: { depthTest: true },
                pickable: true,
                // 🛠️ 增强：自动路径纠错 (Streamlit Cloud 404 Fallback)
                fetch: (url) => fetch(url).then(res => {
                    if (res.status === 404 && url.includes('/app/')) {
                        const fallback = url.replace('/app/', '/');
                        console.warn(`[System] Landuse 404 at ${url}, retrying fallback: ${fallback}`);
                        return fetch(fallback);
                    }
                    return res;
                }).then(res => res.json())
            }));
        }

        // ✴️ 图层 3：重点地块
        if (plots_data) {
            renderedLayers.push(new deck.GeoJsonLayer({
                id: 'plots-layer',
                data: plots_data,
                stroked: true,
                filled: true,
                extruded: false,
                getFillColor: [220, 38, 38, 100],
                getLineColor: [220, 38, 38, 255],
                getLineWidth: 5,
                lineWidthMinPixels: 2,
                parameters: {
                    depthTest: true
                },
                pickable: true
            }));
        }

        // 📍 图层 4：POI 散点层
        if (poi_data && poi_data.length > 0) {
            renderedLayers.push(new deck.ScatterplotLayer({
                id: 'poi-layer',
                data: poi_data,
                getPosition: d => [d.Lng, d.Lat],
                getFillColor: [129, 140, 248, 200],
                getRadius: 6,
                radiusMinPixels: 4,
                radiusMaxPixels: 20,
                pickable: true
            }));
        }

        // 🚦 图层 5：交通拥堵热力簇 (增加动画过渡)
        if (traffic_data && traffic_data.length > 0) {
            renderedLayers.push(new deck.ScatterplotLayer({
                id: 'traffic-layer',
                data: traffic_data,
                getPosition: d => [d.Lng, d.Lat],
                getFillColor: [244, 63, 94, 230], // 玫瑰红 (Rose-500)
                getRadius: 15,
                radiusMinPixels: 6,
                radiusMaxPixels: 50,
                pickable: true,
                transitions: {
                    getRadius: 800,
                    getFillColor: 800
                }
            }));
        }

        // 🔬 图层 6：空间指标 3D 柱体
        if (col_payload && col_payload.data && col_payload.data.length > 0) {
            renderedLayers.push(new deck.ColumnLayer({
                id: 'col-layer',
                data: col_payload.data,
                diskResolution: 64,  // 圆润的柱体
                radius: col_payload.radius,
                coverage: 0.95,      // 轻微内收边距增加质感
                extruded: true,
                pickable: true,
                elevationScale: col_payload.elevationScale,
                getPosition: d => [d.Lng, d.Lat],
                getFillColor: d => d.Dynamic_Color || [99, 102, 241, 230],
                getElevation: d => d[col_payload.metric] || 0,
                material: {
                    ambient: 0.5,
                    diffuse: 0.8,
                    shininess: 32,
                    specularColor: [255, 255, 255]
                },
                transitions: {
                    getElevation: 600,
                    getFillColor: 600
                }
            }));
        }

        // 🔬 图层 7：空间指标 2D 热力云图
        if (heat_payload && heat_payload.data && heat_payload.data.length > 0) {
            renderedLayers.push(new deck.HeatmapLayer({
                id: 'heat-layer',
                data: heat_payload.data,
                getPosition: d => [d.Lng, d.Lat],
                getWeight: d => d[heat_payload.metric] || 0,
                radiusPixels: heat_payload.radius,
                opacity: 0.8
            }));
        }

        // 🔬 图层 8：交通与活力聚合蜂窝 (活力能量配色: 黄->橙->红)
        if (hex_payload && hex_payload.data && hex_payload.data.length > 0) {
            renderedLayers.push(new deck.HexagonLayer({
                id: 'hex-layer',
                data: hex_payload.data,
                getPosition: d => [d.Lng, d.Lat],
                radius: hex_payload.radius,
                elevationScale: hex_payload.elevationScale,
                extruded: true,
                colorRange: [
                    [255, 255, 178], // 浅黄
                    [254, 217, 118],
                    [254, 178, 76],
                    [253, 141, 60],
                    [240, 59, 32],
                    [189, 0, 38]     // 深红 (能量最高)
                ],
                pickable: true,
                transitions: {
                    elevationScale: 1000
                }
            }));
        }

        // 🔬 图层 8：地下基础设施 X 光管网 (Subsurface X-Ray)
        const pipe_payload = /*__PIPE_PAYLOAD__*/null/*__END_PIPE__*/;
        if (IS_XRAY && pipe_payload && pipe_payload.length > 0) {
            renderedLayers.push(new deck.PathLayer({
                id: 'underground-pipes-layer',
                data: pipe_payload,
                widthScale: 2,
                widthMinPixels: 2,
                getPath: d => d.path,
                getColor: d => d.type === 'water' ? [56, 189, 248, 255] : [250, 204, 21, 255], // Blue for water, Yellow for power
                getWidth: d => d.type === 'water' ? 3 : 2,
                pickable: true,
                parameters: {
                    depthTest: false // Ensure it glows through the ground
                }
            }));
        }

        // 🚀 初始化 GPU 加速 3D 渲染引擎
        document.getElementById('map-container').addEventListener('contextmenu', e => e.preventDefault());

        // 🌅 V3.0 光影增强：环境光 + 定向光源 (模拟上午 10 点长春日照角)
        const ambientLight = new deck.AmbientLight({
            color: [255, 255, 255],
            intensity: 1.0
        });
        const directionalLight = new deck._SunLight({
            timestamp: Date.UTC(2026, 3, 20, (sun_time - 8 + 24) % 24, 0, 0),  // 转换为 UTC 以匹配本地时间投射效果
            color: [255, 245, 230],
            intensity: 2.2,
            _shadow: is_3d  // 仅 3D 模式下启用实时阴影
        });
        const lightingEffect = new deck.LightingEffect({ ambientLight, directionalLight });
        
        const deckInstance = new deck.DeckGL({
            container: 'map-container',
            mapStyle: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            effects: (is_3d && show_lighting) ? [lightingEffect] : [],
            initialViewState: {
                latitude: 43.903,
                longitude: 125.337,
                zoom: 15,
                pitch: is_3d ? 45 : 0,
                bearing: is_3d ? -15 : 0
            },
            controller: {
                dragRotate: is_3d,
                dragPan: true,
                scrollZoom: true
            },
            layers: renderedLayers,
            getTooltip: ({object, layer}) => {
                if (!object || !layer) return null;
                
                // 🏷️ 特殊逻辑：历史建筑增强提示
                if (layer.id === 'building-layer' && object.properties.is_historical) {
                    return {
                        html: `<div style="border-bottom: 1px solid #818cf8; margin-bottom: 5px; padding-bottom: 5px; font-weight: bold; color: #a5b4fc;">🏛️ 重点历史建筑</div>
                               <b>${object.properties.hist_name}</b><br>
                               <span style="font-size: 11px; opacity: 0.8;">名录批次: ${object.properties.hist_batch}</span>`
                    };
                }

                // 🧬 用地规划提示
                if (layer.id === 'landuse-layer') {
                    const LANDUSE_NAMES = {
                        0: '居住用地 (R)', 
                        1: '商业办公用地 (C2)', 
                        2: '商业服务业用地 (C1)',
                        3: '工业用地 (M)', 
                        4: '交通场站用地 (S)', 
                        5: '机场设施用地 (S)',
                        6: '行政办公用地 (A1)', 
                        7: '教育科研用地 (A3)', 
                        8: '医疗卫生用地 (A5)',
                        9: '体育文化用地 (A2)', 
                        10: '公园与绿地 (G)'
                    };
                    const cls = object.properties.Class;
                    return {
                        html: `<div style="border-bottom: 1px solid #818cf8; margin-bottom: 5px; padding-bottom: 5px; font-weight: bold; color: #a5b4fc;">🧬 规划用地</div>
                               <b>${LANDUSE_NAMES[cls] || '未知类型'}</b><br>
                               <span style="font-size: 11px; opacity: 0.8;">EULUC Code: ${cls}</span>`
                    };
                }

                const name = (object.properties ? (object.properties.Name || object.properties.name) : (object.Name || object.name));
                
                if (layer.id === 'poi-layer') {
                    return { html: `<b>📍 POI点位: ${name || '未知设施'}</b>` };
                }
                if (layer.id === 'traffic-layer') {
                    return { html: `<b>🚥 交通点位: ${name || '拥堵热域'}</b>` };
                }
                if (layer.id === 'plots-layer') {
                    return { html: `<b>🏗️ 重点更新地块: ${name || '未命名'}</b>` };
                }
                if (layer.id === 'col-layer') {
                    return { html: `<b>📊 指标采集点 (ID: ${object.ID || 'N/A'})</b><br>数值水平: ${object[col_payload?.metric] ? parseFloat(object[col_payload.metric]).toFixed(3) : '未知'}` };
                }
                if (layer.id === 'hex-layer') {
                    return { html: `<b>🔮 蜂窝密度聚合区</b><br>聚合强度: ${object.points ? object.points.length : '未知'} 活跃单元` };
                }
                
                if (name) return { html: `<b>📡 ${name}</b>` };
                return { html: `<b>🌐 空间探测点</b>` };
            }
        });

        // ==========================================
        // 🌐 建筑层异步状态监控 (仅保留日志，渲染由上层 GeoJsonLayer 托管)
        // ==========================================
        if (b_data && typeof b_data === 'string') {
             console.log(`[System] Building layer will be loaded asynchronously from: ${b_data}`);
        }
    </script>

    <!-- 🖱️ 鼠标交互引导 HUD -->
    <div style="position: absolute; top: 15px; right: 15px; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 12px; padding: 12px 18px; color: rgba(248, 250, 252, 0.9); font-family: 'Inter', sans-serif; font-size: 13px; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 100;">
        <div style="margin-bottom: 6px; font-weight: 700; color: #818cf8; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;">视角控制</div>
        <div style="display: flex; gap: 10px; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                <span>🖱️ 左键拖动</span>
                <span style="font-size: 11px; opacity: 0.7;">平移视角</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                <span>🖱️ 右键拖动 / Ctrl+左键</span>
                <span style="font-size: 11px; opacity: 0.7;">转动/倾斜</span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; gap: 20px;">
                <span>⚙️ 滑动滚轮</span>
                <span style="font-size: 11px; opacity: 0.7;">缩放远近</span>
            </div>
        </div>
    </div>

    <!-- 🗺️ 动态图例面板 -->
    <div id="map-legend" style="position: absolute; bottom: 35px; right: 15px; background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border: 1px solid rgba(99, 102, 241, 0.4); border-radius: 12px; padding: 15px; color: rgba(248, 250, 252, 0.9); font-family: 'Inter', sans-serif; box-shadow: 0 5px 20px rgba(0,0,0,0.5); z-index: 100; min-width: 180px; max-height: calc(100vh - 150px); overflow-y: auto;">
        <div style="margin-bottom: 12px; font-weight: 800; color: #a5b4fc; font-size: 13.5px; letter-spacing: 0.05em; border-bottom: 1px solid rgba(99,102,241,0.3); padding-bottom: 8px; display: flex; align-items: center; gap: 6px;">
            <span>📋</span> 空间资产图例 (Legend)
        </div>
        <div id="legend-content" style="display: flex; flex-direction: column; gap: 9px;">
            <!-- 由 JS 动态注入 -->
        </div>
    </div>

    <script>
        // === 图例生成逻辑 ===
        const lc = document.getElementById("legend-content");
        let lHtml = "";
        const addItem = (cssBg, text) => {
            lHtml += `<div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 14px; height: 14px; border-radius: 3px; background: ${cssBg}; border: 1px solid rgba(255,255,255,0.25); flex-shrink: 0;"></div>
                <span style="font-size: 11.5px; color: rgba(248, 250, 252, 0.95); white-space: nowrap;">${text}</span>
            </div>`;
        };
        const addGradientItem = (gradient, text, minText="低", maxText="高") => {
            lHtml += `<div style="margin-top: 4px; margin-bottom: 6px; display: flex; flex-direction: column; gap: 6px;">
                <span style="font-size: 11.5px; color: rgba(248, 250, 252, 0.95);">${text}</span>
                <div style="height: 10px; width: 100%; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: ${gradient};"></div>
                <div style="display: flex; justify-content: space-between; font-size: 10px; color: rgba(148, 163, 184, 0.8); line-height: 1;">
                    <span>${minText}</span><span>${maxText}</span>
                </div>
            </div>`;
        };

        if (bound_data) addItem("rgba(239, 68, 68, 0.25)", "空间研究红线边界");
        if (plots_data) addItem("rgba(220, 38, 38, 0.5)", "重点微更新锚点地块");
        
        if (b_data) {
            if (IS_DEMO) {
                addItem("rgba(139, 92, 246, 0.9)", "修缮保护 (保留锚定)");
                addItem("rgba(250, 204, 21, 0.8)", "功能置换 (综合改造)");
                addItem("rgba(239, 68, 68, 0.9)", "拆除腾退 (塌缩消隐)");
            } else {
                addItem("rgba(153, 0, 255, 1)", "受保护历史风貌建筑");
                addItem("rgba(173, 216, 230, 0.78)", "现状一般建筑肌理");
            }
        }
        
        if (IS_XRAY) {
            addItem("rgba(56, 189, 248, 1)", "地下给排水干管 (Water/Sewer)");
            addItem("rgba(250, 204, 21, 1)", "地下电力通讯线网 (Power/Comm)");
        }

        if (poi_data && poi_data.length > 0) addItem("rgba(129, 140, 248, 0.78)", "公共服务与商业设施散点");
        if (traffic_data && traffic_data.length > 0) addItem("rgba(244, 63, 94, 0.9)", "职住交通与活跃能量分布");
        if (hex_payload) addItem("rgba(245, 158, 11, 0.9)", "多模态能量网格聚合簇");
        
        // 使用渐变色带替代单点颜色
        if (col_payload) addGradientItem("linear-gradient(90deg, rgb(6,182,212), rgb(139,92,246), rgb(244,63,94))", "空间截面量化测度数值分布 (3D柱体)");
        if (heat_payload) addGradientItem("linear-gradient(90deg, rgba(59,130,246,0.6), rgba(16,185,129,0.8), rgba(239,68,68,1))", "社会感知诉求能量场 (2D热力)");
        
        if (landuse_data) {
            lHtml += `<div style="margin-top: 8px; margin-bottom: 2px; font-weight: 700; color: #818cf8; font-size: 11px; border-bottom: 1px solid rgba(99,102,241,0.2); padding-bottom: 4px;">法定用地性质配置 (GB/T 50337-2018)</div>`;
            addItem("rgba(255, 255, 0, 0.62)", "R 城乡居住用地");
            addItem("rgba(191, 0, 0, 0.62)", "C2 商务办公用地");
            addItem("rgba(255, 0, 0, 0.62)", "C1 商业服务业用地");
            addItem("rgba(165, 82, 45, 0.62)", "M 城市工业用地");
            addItem("rgba(190, 190, 190, 0.62)", "S/U 交通场站用地");
            addItem("rgba(150, 150, 150, 0.62)", "S/U 机场设施用地");
            addItem("rgba(255, 127, 127, 0.62)", "A1 行政办公用地");
            addItem("rgba(255, 191, 255, 0.62)", "A3 教育科研用地");
            addItem("rgba(255, 127, 212, 0.62)", "A5 医疗卫生用地");
            addItem("rgba(153, 0, 255, 0.62)", "A2 体育文化用地");
            addItem("rgba(0, 190, 0, 0.62)", "G 城市公园与生态绿地");
        }

        if (lHtml === "") {
            document.getElementById("map-legend").style.display = "none";
        } else {
            lc.innerHTML = lHtml;
        }
    </script>
</body>
</html>
