name: Feature request
description: Suggest a product, data or planning workflow improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What planning workflow or user need should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change you want.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Mention affected pages, data files or engines if known.
    validations:
      required: false
